// Vérification pseudo unique + feedback
async function savePseudo(){
  const p = document.getElementById('pseudo-input').value.trim();
  if(!p){ showToast('Entre un pseudo !','error'); return; }
  if(p.length < 3){ showToast('Pseudo trop court (min 3)','error'); return; }

  try {
    const existing = await sbFetch(`/rest/v1/leaderboard?pseudo=eq.${encodeURIComponent(p)}&select=pseudo`);
    if(Array.isArray(existing) && existing.length > 0){
      showToast('Ce pseudo est déjà pris !','error');
      return;
    }
  } catch(e){
    showToast('Erreur de vérification','error');
    return;
  }

  state.pseudo = p;
  state.pseudoLocked = true;
  saveState();
  document.getElementById('setup-screen').style.display = 'none';
  upsertScore();
  renderAll();
  startDailyTimer();
  showToast('Bienvenue sur Grindly !','success');
}

// Recherche joueur (inchangée)

// Rang optimisé (limite à 1000 résultats max)
async function getPlayerRank(pseudo){
  try{
    const all = await sbFetch(`/rest/v1/leaderboard?select=pseudo&order=xp.desc&limit=1000`);
    if(!Array.isArray(all)) return '?';
    const idx = all.findIndex(p => p.pseudo === pseudo);
    return idx >= 0 ? idx + 1 : '?';
  }catch{return '?';}
}

function previewBookPhoto(e, id){
  const file = e.target.files[0];
  if(!file) return;

  const title = document.getElementById('book-title').value.trim();
  if(!title){
    showToast('Entre le titre du livre !','error');
    return;
  }

  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('book-photo-preview');
    if(img){ img.src = ev.target.result; img.style.display = 'block'; }
    const btn = document.getElementById('book-validate');
    if(btn) btn.style.display = 'block';
  };
  reader.readAsDataURL(file);
}
